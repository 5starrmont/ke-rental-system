<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Ke-Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card bg-secondary text-white shadow-lg border-0" style="border-radius: 15px;">
                    <div class="card-body p-5 text-center">
                        <h3 class="mb-4 text-info">Ke-Rental Login</h3>
                        
                        {% if form.errors %}
                            <div class="alert alert-danger py-2 small">Invalid username or password.</div>
                        {% endif %}

                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3 text-start">
                                <label class="form-label">Username</label>
                                <input type="text" name="username" class="form-control bg-dark text-white border-0" required>
                            </div>
                            <div class="mb-3 text-start">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control bg-dark text-white border-0" required>
                            </div>
                            <button type="submit" class="btn btn-info w-100 mt-2 fw-bold">Sign In</button>
                        </form>
                    </div>
                </div>
                <p class="text-center mt-3 text-white-50 small">Access restricted to authorized tenants.</p>
            </div>
        </div>
    </div>
</body>
</html>
